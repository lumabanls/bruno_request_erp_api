info:
  name: delete_file
  type: http
  seq: 2

http:
  method: POST
  url: http://{{host}}:{{port}}/api/dfile
  body:
    type: json
    data: |-
      {
          "path": "files/nature.jpg"
      }
  auth: inherit

runtime:
  variables:
    - name: port
      value: "3000"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
